<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Unidades de Comprimento</title>
</head>
<body>

    <div class="card">
        <h1>Conversor de Unidades de Comprimento</h1>
        
        <label for="valor">Digite o valor:</label>
        <input type="number" id="valor" placeholder="Ex: 100">

        <select id="deUnidade">
            <option value="m">Metros (m)</option>
            <option value="km">Quilometros (km)</option>
            <option value="mi">Milhas (mi)</option>
            <option value="in">Polegadas (in)</option>
        </select>

        <span> para </span>

        <select id="paraUnidade">
            <option value="m">Metros (m)</option>
            <option value="km">Quilometros (km)</option>
            <option value="mi">Milhas (mi)</option>
            <option value="in">Polegadas (in)</option>
        </select>

        <button onclick="converter()">Converter</button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
