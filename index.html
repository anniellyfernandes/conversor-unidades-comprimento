<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades de Comprimento</title>
</head>
<body>

    <h1>Conversor de Unidades de Comprimento</h1>
    
    <!-- Campo para o usuário digitar o número -->
    <label for="valor">Digite o valor:</label>
    <input type="number" id="valor" placeholder="Ex: 100">

    <!-- Botão que acionará o cálculo -->
    <button>Converter</button>

    <!-- Local onde o resultado será exibido -->
    <div id="resultado"></div>

</body>
</html>
